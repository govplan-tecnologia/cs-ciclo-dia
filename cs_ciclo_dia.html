<!-- ===== SCRIPT (SÓ PATCHS) ===== -->
<script>

let API_URL = localStorage.getItem('cs_api_url') || '';
let CLIENTES = [];
let abertos = {};
let modalClienteId = null;

async function carregarClientes() {
  document.getElementById('loading').classList.remove('hide');

  try {
    if (!API_URL) throw new Error("sem API");

    const res = await fetch(API_URL);
    const data = await res.json();

    CLIENTES = (data?.clientes || []).map(c => ({
      ...c,
      etapa: c.etapaAtual || c.etapa || 1,
      checks: c.checks || {},
      nok: c.nok || [],
      concluida: false
    }));

  } catch (err) {
    CLIENTES = dadosDemo();
  }

  document.getElementById('loading').classList.add('hide');
  montarTabs();
  renderLista();
}

function renderLista() {
  const lista = document.getElementById('lista');

  lista.innerHTML = CLIENTES.map(c => {

    const et = ETAPAS[c.etapa] || ETAPAS[1]; // FIX
    const sigla = (c.nome || '').split(' ').slice(0,2).map(p => p[0] || '').join('').toUpperCase();

    const total = et.itens.length;
    const feitos = Object.values(c.checks || {}).filter(Boolean).length;

    const pct = total ? Math.round(feitos / total * 100) : 0;

    const dataIni = c.dataInicio
      ? new Date(c.dataInicio + 'T12:00:00').toLocaleDateString('pt-BR')
      : '—';

    const consultora = (c.consultora || '—');

    return `
      <div class="cliente-card ep-${c.etapa}">
        <div class="card-header">
          <div class="avatar">${sigla}</div>

          <div class="card-info">
            <div class="card-nome">${c.nome}</div>

            <div class="card-meta">
              <span>${consultora}</span>
              <span>${pct}%</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

/* ===== DEMO ===== */
function dadosDemo(){
  return [
    {id:1,nome:"Cliente A",consultora:"taina",dataInicio:"2025-06-01",etapa:1,checks:{},nok:[]},
    {id:2,nome:"Cliente B",consultora:"karina",dataInicio:"2025-04-10",etapa:2,checks:{},nok:[]}
  ];
}

carregarClientes();

</script>
