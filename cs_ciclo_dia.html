<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS · CICLO DO DIA — Govplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #4CAF1A;
  --green-d: #3a8f12;
  --green-l: #f0fae6;
  --green-m: #c6efaa;
  --navy: #1B2F5E;
  --navy-l: #e8ecf5;
  --navy-m: #b0bcda;
  --bg: #F4F6FB;
  --surface: #ffffff;
  --border: #E2E8F0;
  --border2: #CBD5E1;
  --text: #1B2F5E;
  --text2: #4A5568;
  --text3: #94A3B8;
  --red: #C0392B; --red-l: #FEF2F2; --red-m: #FECACA;
  --amber: #B45309; --amber-l: #FFFBEB; --amber-m: #FDE68A;
  --purple: #6D28D9; --purple-l: #F5F3FF; --purple-m: #DDD6FE;
  --teal: #0F766E; --teal-l: #F0FDFA; --teal-m: #99F6E4;
  --orange: #C2410C; --orange-l: #FFF7ED; --orange-m: #FED7AA;
  --pink: #9D174D; --pink-l: #FDF2F8; --pink-m: #FBCFE8;
  --sky: #0369A1; --sky-l: #F0F9FF; --sky-m: #BAE6FD;
  --r: 12px; --rs: 8px;
  --sh: 0 1px 3px rgba(27,47,94,.08), 0 1px 2px rgba(27,47,94,.05);
  --sh-lg: 0 8px 24px rgba(27,47,94,.10);
}
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* LOADING */
.loading-overlay { position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;transition:opacity .4s; }
.loading-overlay.hide { opacity:0;pointer-events:none; }
.loading-logo { font-size:28px;font-weight:700;color:white;letter-spacing:-0.5px; }
.loading-logo span { color:var(--green); }
.loading-spinner { width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite; }
.loading-txt { font-size:14px;color:rgba(255,255,255,.6); }
@keyframes spin { to { transform:rotate(360deg); } }

/* HEADER */
.app-header {
  background:var(--navy);
  padding:0 28px; height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(27,47,94,.3);
}
.app-logo { display:flex;align-items:center;gap:10px; }
.logo-icon { width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center; }
.logo-icon i { color:white;font-size:18px; }
.logo-text { font-size:16px;font-weight:700;color:white;letter-spacing:-.3px; }
.logo-text span { color:var(--green); }
.header-right { display:flex;align-items:center;gap:12px; }
.header-date { font-size:12px;color:rgba(255,255,255,.6); }
.btn-reload { font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border:1.5px solid rgba(255,255,255,.2);border-radius:var(--rs);background:transparent;color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s; }
.btn-reload:hover { background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4); }

/* CONFIG BANNER */
.config-banner { background:var(--amber-l);border-bottom:1px solid var(--amber-m);padding:10px 28px;font-size:13px;color:var(--amber);display:flex;align-items:center;gap:10px; }
.config-banner input { font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--amber-m);border-radius:var(--rs);background:white;color:var(--text);flex:1;max-width:500px;outline:none; }
.config-banner button { font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border:none;border-radius:var(--rs);background:var(--amber);color:white;cursor:pointer; }

/* HERO BANNER */
.hero-banner {
  background:linear-gradient(135deg, var(--navy) 0%, #2a4a8a 100%);
  padding:28px 28px 0;
  display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;
}
.hero-text { flex:1;min-width:200px;padding-bottom:24px; }
.hero-greeting { font-size:13px;color:rgba(255,255,255,.6);margin-bottom:4px; }
.hero-title { font-size:22px;font-weight:700;color:white;margin-bottom:8px; }
.hero-sub { font-size:13px;color:rgba(255,255,255,.7); }
.hero-cards { display:flex;gap:12px;flex-wrap:wrap;padding-bottom:24px; }
.hero-card {
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:var(--r);padding:14px 18px;min-width:130px;text-align:center;
  backdrop-filter:blur(10px);
}
.hero-card-num { font-size:28px;font-weight:700;color:white;line-height:1; }
.hero-card-num.green { color:var(--green); }
.hero-card-num.red { color:#FF6B6B; }
.hero-card-label { font-size:11px;color:rgba(255,255,255,.6);margin-top:4px; }

/* TOOLBAR */
.toolbar { background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap; }
.toolbar select { font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:8px 12px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text);outline:none;cursor:pointer; }
.toolbar select:focus { border-color:var(--green);box-shadow:0 0 0 3px rgba(76,175,26,.15); }
.search-box { position:relative;flex:1;max-width:280px; }
.search-box i { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px; }
.search-box input { font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px 8px 34px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text);outline:none;width:100%; }
.search-box input:focus { border-color:var(--green);box-shadow:0 0 0 3px rgba(76,175,26,.15); }

/* ETAPAS TABS */
.etapas-tabs { background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:2px;overflow-x:auto; }
.etapas-tabs::-webkit-scrollbar { height:0; }
.tab-btn { font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:12px 14px;border:none;background:none;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s; }
.tab-btn:hover { color:var(--navy); }
.tab-btn.active { color:var(--green-d);border-bottom-color:var(--green); }

/* MAIN */
.main { max-width:960px;margin:0 auto;padding:24px 28px; }

/* ATRASO BANNER */
.atraso-banner { background:var(--red-l);border:1.5px solid var(--red-m);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:none; }
.atraso-banner.show { display:block; }
.atraso-title { font-size:13px;font-weight:600;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:6px; }
.atraso-item { font-size:12px;color:var(--red);display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--red-m); }
.atraso-item:last-child { border-bottom:none; }

/* CARDS */
.cards-list { display:flex;flex-direction:column;gap:12px; }
.cliente-card { background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .2s,transform .1s; }
.cliente-card:hover { box-shadow:var(--sh-lg);transform:translateY(-1px); }

/* Cor da borda esquerda por etapa */
.cliente-card.ep-1 { border-left:4px solid #1D4ED8; }
.cliente-card.ep-2 { border-left:4px solid #15803D; }
.cliente-card.ep-3 { border-left:4px solid #B45309; }
.cliente-card.ep-4 { border-left:4px solid #6D28D9; }
.cliente-card.ep-5 { border-left:4px solid #9D174D; }
.cliente-card.ep-6 { border-left:4px solid #C2410C; }
.cliente-card.ep-7 { border-left:4px solid #0F766E; }
.cliente-card.ep-8 { border-left:4px solid #854D0E; }
.cliente-card.ep-9 { border-left:4px solid #0369A1; }
.cliente-card.ep-10 { border-left:4px solid #374151; }
.cliente-card.atrasado { border-left:4px solid var(--red)!important; }
.cliente-card.concluido { opacity:.55; }

.card-header { padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none; }
.card-header:hover { background:#FAFBFF; }

.avatar { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0; }
.av-1{background:#DBEAFE;color:#1D4ED8} .av-2{background:#DCFCE7;color:#15803D}
.av-3{background:#FEF9C3;color:#854D0E} .av-4{background:#EDE9FE;color:#6D28D9}
.av-5{background:#FCE7F3;color:#9D174D} .av-6{background:#FFEDD5;color:#C2410C}
.av-7{background:#CCFBF1;color:#0F766E} .av-8{background:#FEF9C3;color:#854D0E}
.av-9{background:#E0F2FE;color:#0369A1} .av-10{background:#F1F5F9;color:#374151}

.card-info { flex:1;min-width:0; }
.card-nome { font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.card-meta { font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap; }
.meta-sep { color:var(--text3); }
.badge-hoje { background:var(--navy-l);color:var(--navy);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px; }
.badge-hoje::before { content:'';width:6px;height:6px;border-radius:50%;background:var(--navy); }
.badge-atr { background:var(--red-l);color:var(--red);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px; }
.badge-atr::before { content:'';width:6px;height:6px;border-radius:50%;background:var(--red); }
.badge-nok { background:var(--amber-l);color:var(--amber);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px; }
.badge-ok { background:var(--green-l);color:var(--green-d);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px; }

.card-right { display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0; }
.etapa-pill { font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap; }
.ep-pill-1{background:#DBEAFE;color:#1D4ED8} .ep-pill-2{background:#DCFCE7;color:#15803D}
.ep-pill-3{background:#FEF9C3;color:#854D0E} .ep-pill-4{background:#EDE9FE;color:#6D28D9}
.ep-pill-5{background:#FCE7F3;color:#9D174D} .ep-pill-6{background:#FFEDD5;color:#C2410C}
.ep-pill-7{background:#CCFBF1;color:#0F766E} .ep-pill-8{background:#FEF9C3;color:#854D0E}
.ep-pill-9{background:#E0F2FE;color:#0369A1} .ep-pill-10{background:#F1F5F9;color:#374151}
.chevron { font-size:20px;color:var(--text3);transition:transform .2s; }
.chevron.open { transform:rotate(180deg); }

/* PROGRESS */
.progress-wrap { height:4px;background:var(--border); }
.progress-bar { height:4px;background:linear-gradient(90deg,var(--green),var(--green-d));transition:width .4s; }

/* CARD BODY */
.card-body { display:none;border-top:1.5px solid var(--border); }
.card-body.open { display:block; }
.cl-section { padding:20px; }
.cl-section-title { font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:6px; }

.cl-item { display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
.cl-item:last-child { border-bottom:none; }
.cl-checkbox { width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px; }
.cl-checkbox.checked { background:var(--green);border-color:var(--green); }
.cl-checkbox.checked::after { content:'';display:block;width:5px;height:10px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px); }
.cl-label { font-size:13px;color:var(--text);line-height:1.6;cursor:pointer; }
.cl-label.done { color:var(--text3);text-decoration:line-through; }

.nok-historico { margin-top:14px;padding:12px 14px;background:var(--red-l);border-radius:var(--rs);border:1px solid var(--red-m); }
.nok-historico-title { font-size:11px;font-weight:700;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:5px; }
.nok-entry { font-size:12px;color:var(--red);padding:5px 0;border-bottom:1px solid var(--red-m); }
.nok-entry:last-child { border-bottom:none; }

/* CARD FOOTER */
.card-footer { padding:14px 20px;border-top:1.5px solid var(--border);background:#FAFBFF;display:flex;align-items:center;gap:8px;flex-wrap:wrap; }
.footer-info { font-size:12px;color:var(--text2);flex:1; }
.btn { font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:7px 16px;border-radius:var(--rs);border:1.5px solid;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s; }
.btn-crm { border-color:var(--border2);background:var(--surface);color:var(--text2); }
.btn-crm:hover { background:var(--bg);border-color:var(--navy); }
.btn-ok { border-color:var(--green);background:var(--green);color:white; }
.btn-ok:hover { background:var(--green-d);border-color:var(--green-d); }
.btn-nok { border-color:var(--red);background:transparent;color:var(--red); }
.btn-nok:hover { background:var(--red-l); }

/* MODAL */
.modal-overlay { position:fixed;inset:0;background:rgba(27,47,94,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface);border-radius:var(--r);box-shadow:0 24px 64px rgba(27,47,94,.2);width:100%;max-width:500px;padding:28px; }
.modal-title { font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px; }
.modal-sub { font-size:13px;color:var(--text2);margin-bottom:18px; }
.modal textarea { width:100%;font-family:'Inter',sans-serif;font-size:13px;padding:12px;border:1.5px solid var(--border2);border-radius:var(--rs);color:var(--text);resize:vertical;min-height:100px;outline:none; }
.modal textarea:focus { border-color:var(--green);box-shadow:0 0 0 3px rgba(76,175,26,.15); }
.modal-actions { display:flex;gap:8px;justify-content:flex-end;margin-top:16px; }
.btn-cancel { border-color:var(--border2);background:var(--surface);color:var(--text2); }
.btn-save-red { border-color:var(--red);background:var(--red);color:white; }
.btn-save-red:hover { opacity:.9; }

/* EMPTY */
.empty { text-align:center;padding:56px 20px;color:var(--text3); }
.empty i { font-size:40px;display:block;margin-bottom:12px;color:var(--border2); }
.empty p { font-size:14px; }

/* FOOTER */
.app-footer { margin-top:48px;padding:20px 28px;border-top:1px solid var(--border);text-align:center; }
.footer-logo { font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px; }
.footer-logo span { color:var(--green); }
.footer-dev { font-size:11px;color:var(--text3); }
.footer-dev strong { color:var(--text2); }

@media(max-width:600px){
  .main{padding:16px} .toolbar{padding:10px 16px} .etapas-tabs{padding:0 16px}
  .app-header{padding:0 16px} .hero-banner{padding:20px 16px 0}
  .card-header{padding:14px 16px} .cl-section{padding:16px} .card-footer{padding:12px 16px}
  .hero-cards{gap:8px} .hero-card{min-width:100px;padding:12px}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-logo">GOV<span>PLAN</span></div>
  <div class="loading-spinner"></div>
  <div class="loading-txt">Carregando clientes...</div>
</div>

<header class="app-header">
  <div class="app-logo">
    <div class="logo-icon"><i class="ti ti-check"></i></div>
    <div class="logo-text">GOV<span>PLAN</span> · CS</div>
  </div>
  <div class="header-right">
    <span class="header-date" id="header-date"></span>
    <button class="btn-reload" onclick="carregarClientes()"><i class="ti ti-refresh"></i> Atualizar</button>
  </div>
</header>

<div class="config-banner" id="config-banner">
  <i class="ti ti-settings"></i>
  <span>Cole a URL do Apps Script:</span>
  <input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/..." />
  <button onclick="salvarApiUrl()">Conectar</button>
</div>

<div class="hero-banner" id="hero-banner">
  <div class="hero-text">
    <div class="hero-greeting" id="hero-greeting">Bom dia!</div>
    <div class="hero-title">Ciclo do Dia — CS</div>
    <div class="hero-sub" id="hero-sub">Carregando dados...</div>
  </div>
  <div class="hero-cards">
    <div class="hero-card">
      <div class="hero-card-num green" id="hc-hoje">—</div>
      <div class="hero-card-label">No ciclo hoje</div>
    </div>
    <div class="hero-card">
      <div class="hero-card-num" id="hc-total">—</div>
      <div class="hero-card-label">Total de clientes</div>
    </div>
    <div class="hero-card">
      <div class="hero-card-num red" id="hc-atr">—</div>
      <div class="hero-card-label">Em atraso</div>
    </div>
  </div>
</div>

<div class="toolbar">
  <select id="sel-consultora" onchange="aplicarFiltros()">
    <option value="all">Todas as consultoras</option>
  </select>
  <select id="sel-view" onchange="aplicarFiltros()">
    <option value="hoje">Ciclo de hoje</option>
    <option value="all">Todos os clientes</option>
    <option value="atrasados">Apenas atrasados</option>
  </select>
  <div class="search-box">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Buscar cliente..." oninput="aplicarFiltros()">
  </div>
</div>

<div class="etapas-tabs" id="etapas-tabs">
  <button class="tab-btn active" onclick="filtrarEtapa('all',this)">Todas</button>
</div>

<div class="main">
  <div class="atraso-banner" id="atraso-banner">
    <div class="atraso-title"><i class="ti ti-alert-triangle"></i> Ciclos em atraso — ação necessária</div>
    <div id="atraso-list"></div>
  </div>
  <div class="cards-list" id="lista"></div>
</div>

<footer class="app-footer">
  <div class="footer-logo">GOV<span>PLAN</span> · CS Ciclo do Dia</div>
  <div class="footer-dev">Desenvolvido por <strong>Monithelly</strong> · Govplan </div>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-nok">
  <div class="modal">
    <div class="modal-title">Registrar impedimento</div>
    <div class="modal-sub" id="modal-nok-sub"></div>
    <textarea id="modal-nok-texto" placeholder="Descreva o motivo de não conclusão desta etapa..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-save-red" onclick="salvarNok()"><i class="ti ti-check"></i> Registrar</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
let API_URL = localStorage.getItem('cs_api_url') || '';
if (API_URL) document.getElementById('config-banner').style.display = 'none';

function salvarApiUrl() {
  const url = document.getElementById('api-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) { alert('URL inválida.'); return; }
  API_URL = url;
  localStorage.setItem('cs_api_url', url);
  document.getElementById('config-banner').style.display = 'none';
  carregarClientes();
}

// ─── ETAPAS ───────────────────────────────────────────────────────────────────
const ETAPAS = {
  1:{nome:'Boas-vindas',ciclo:30,itens:['Entrar no CRM (GNP) e analisar histórico comercial do cliente','Verificar a quantidade de licenças contratadas','Verificar o número de usuários já cadastrados pelo cliente','Verificar se já houve o primeiro acesso das novas contratações','Verificar a versão contratada pelo cliente','Entrar em contato com o lead (tabela de cadência)','Apresentar-se ao cliente e deixar seus contatos','Informar que fará um novo contato dentro de 30 dias','Registrar informações no GNP']},
  2:{nome:'Verificação de uso',ciclo:30,itens:['Verificar se todos os usuários fizeram treinamento','Verificar se os usuários estão ativos e permanecem os mesmos da contratação','Abrir o relatório de uso e verificar a utilização do sistema','Entrar em contato com o lead (tabela de cadência)','Retomar contato com o cliente e verificar se há dúvidas','Apresentar os canais de comunicação da plataforma','Colocar-se à disposição para sanar dificuldades','Informar próximo contato em 30 dias','Registrar informações no GNP']},
  3:{nome:'Acompanhamento CS',ciclo:30,itens:['Verificar se os usuários estão ativos e permanecem os mesmos da contratação','Abrir o relatório de custo','Verificar a utilização dos módulos da plataforma','Entrar em contato com o lead (tabela de cadência)','Retomar contato com o cliente','Tirar dúvidas e orientar quanto a correções necessárias','Reforçar os canais de comunicação da plataforma','Colocar-se à disposição para sanar dificuldades','Informar próximo contato em 30 dias','Registrar informações no GNP']},
  4:{nome:'Frequência de uso',ciclo:30,itens:['Verificar se os usuários estão ativos e permanecem os mesmos da contratação','Abrir o relatório de custo','Verificar a frequência de uso dos módulos da plataforma','Entrar em contato com o lead (tabela de cadência)','Retomar contato com o cliente','Tirar dúvidas e orientar quanto a correções necessárias','Reforçar os canais de comunicação da plataforma','Colocar-se à disposição para sanar dificuldades','Informar próximo contato em 30 dias para verificação da satisfação','Registrar informações no GNP']},
  5:{nome:'Nível de satisfação',ciclo:30,itens:['Verificar se os usuários estão ativos e permanecem os mesmos da contratação','Abrir o relatório de custo','Verificar a utilização dos módulos da plataforma','Entrar em contato com o lead (tabela de cadência)','Retomar contato com o cliente','Tirar dúvidas e orientar quanto a correções necessárias','Reforçar os canais de comunicação da plataforma','Colocar-se à disposição para sanar dificuldades','Se satisfeito: solicitar atestado de capacidade técnica e disponibilizar link de depoimento','Registrar informações no GNP']},
  6:{nome:'Início de renovação',ciclo:15,itens:['Verificar a data fim do contrato no sistema','Levantar histórico de uso e satisfação do cliente','Preparar proposta de renovação personalizada','Entrar em contato com o gestor responsável','Apresentar proposta e condições de renovação','Registrar andamento no GNP']},
  7:{nome:'Acomp. de renovação',ciclo:15,itens:['Confirmar aceite formal da renovação pelo cliente','Abrir processo de renovação no sistema interno','Enviar documentação necessária ao cliente','Acompanhar assinatura e retorno dos documentos','Confirmar dados cadastrais para renovação','Registrar no GNP']},
  8:{nome:'revisão de empenh',ciclo:15,itens:['Verificar emissão de empenho pelo cliente','Confirmar valor e dados do empenho recebido','Encaminhar informações para o financeiro interno','Checar previsão de pagamento junto ao cliente','Registrar no GNP']},
  9:{nome:'Previsão de empenho',ciclo:15,itens:['Confirmar previsão de empenho com o cliente','Verificar se há pendências documentais','Alinhar com financeiro sobre o prazo esperado','Registrar atualização no GNP']},
};

const AV_COR = e => 'av-'+Math.min(e,10);
const EP_PILL = e => 'ep-pill-'+Math.min(e,10);
const EP_CARD = e => 'ep-'+Math.min(e,10);

// ─── ESTADO ───────────────────────────────────────────────────────────────────
const hoje = new Date();
let CLIENTES = [];
let etapaFiltro = 'all';
let consultFiltro = 'all';
let viewFiltro = 'hoje';
let searchTerm = '';
const abertos = {};
const progressoLocal = JSON.parse(localStorage.getItem('cs_progresso') || '{}');
let modalClienteId = null;

// Header date e saudação
const hora = hoje.getHours();
const saudacao = hora < 12 ? 'Bom dia!' : hora < 18 ? 'Boa tarde!' : 'Boa noite!';
document.getElementById('hero-greeting').textContent = saudacao;
document.getElementById('header-date').textContent =
  hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

// ─── CARREGAR ─────────────────────────────────────────────────────────────────
async function carregarClientes() {
  document.getElementById('loading').classList.remove('hide');
  if (!API_URL) { CLIENTES = dadosDemo(); finalizarCarga(); return; }
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (!data.ok) throw new Error(data.erro);

    CLIENTES = data.clientes.map(c => ({
      ...c,
      etapa: c.etapaAtual || calcEtapa(c.dataInicio, c.dataFim),
      checks: progressoLocal[c.id]?.checks || {},
      nok:    progressoLocal[c.id]?.nok    || [],
      concluida: false,
    }));

    const consultoras = [...new Set(CLIENTES.map(c=>c.consultora).filter(Boolean))].sort();
    const sel = document.getElementById('sel-consultora');
    sel.innerHTML = '<option value="all">Todas as consultoras</option>';
    consultoras.forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n.charAt(0).toUpperCase()+n.slice(1);
      sel.appendChild(o);
    });

    finalizarCarga();
  } catch(err) {
    CLIENTES = dadosDemo();
    finalizarCarga();
    console.warn('Erro API:', err.message);
  }
}

function finalizarCarga() {
  document.getElementById('loading').classList.add('hide');
  montarTabs();
  renderLista();
}

function salvarLocal() {
  const obj = {};
  CLIENTES.forEach(c => { obj[c.id] = { checks: c.checks, nok: c.nok }; });
  localStorage.setItem('cs_progresso', JSON.stringify(obj));
}

// ─── LÓGICA ───────────────────────────────────────────────────────────────────
function calcDias(d) { return d ? Math.floor((hoje - new Date(d))/(864e5)) : 0; }
function calcEtapa(dataInicio, dataFim) {
const hoje = new Date();
const diasInicio = Math.floor((hoje - new Date(dataInicio)) / 86400000);
const diasRestantes = Math.floor((new Date(dataFim) - hoje) / 86400000);
// Últimos 120 dias = renovação
if (diasRestantes <= 120) {
if (diasRestantes <= 30) return 9;
if (diasRestantes <= 60) return 8;
if (diasRestantes <= 90) return 7;
return 6;
}
// Ciclo normal
if (diasInicio < 30) return 1;
if (diasInicio < 60) return 2;
if (diasInicio < 90) return 3;
if (diasInicio < 120) return 4;
return 5;
}
function etapaEsperada(c) { return calcEtapa(c.dataInicio, c.dataFim)); }
function estaAtrasado(c) { return !c.concluida && c.etapa < etapaEsperada(c); }
function estaNoHoje(c) {
return c.etapa === etapaEsperada(c);
}
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function montarTabs() {
  const tabs = document.getElementById('etapas-tabs');
  tabs.innerHTML = '<button class="tab-btn active" onclick="filtrarEtapa(\'all\',this)">Todas</button>';
  Object.entries(ETAPAS).forEach(([k,v]) => {
    const b = document.createElement('button');
    b.className='tab-btn'; b.textContent=`${k} · ${v.nome}`;
    b.onclick=function(){filtrarEtapa(k,this);}; tabs.appendChild(b);
  });
}
function filtrarEtapa(e,btn) {
  etapaFiltro=e;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderLista();
}
function aplicarFiltros() {
  consultFiltro=document.getElementById('sel-consultora').value;
  viewFiltro=document.getElementById('sel-view').value;
  searchTerm=document.getElementById('search-input').value.toLowerCase().trim();
  renderLista();
}

function clientesFiltrados() {
  return CLIENTES.filter(c => {
    if (consultFiltro!=='all' && c.consultora!==consultFiltro) return false;
    if (etapaFiltro!=='all' && String(c.etapa)!==etapaFiltro) return false;
    if (searchTerm && !c.nome.toLowerCase().includes(searchTerm)) return false;
    if (viewFiltro==='hoje' && !estaNoHoje(c) && !estaAtrasado(c)) return false;
    if (viewFiltro==='atrasados' && !estaAtrasado(c)) return false;
    return true;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderLista() {
  const filtrados = clientesFiltrados();
  const todos = CLIENTES.filter(c=>consultFiltro==='all'||c.consultora===consultFiltro);
  const nHoje = todos.filter(estaNoHoje).length;
  const nAtr  = todos.filter(estaAtrasado).length;

  document.getElementById('hc-hoje').textContent  = nHoje;
  document.getElementById('hc-total').textContent = todos.length;
  document.getElementById('hc-atr').textContent   = nAtr;
  document.getElementById('hero-sub').textContent =
    `${nHoje} cliente${nHoje!==1?'s':''} no ciclo hoje · ${hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}`;

  // Banner atraso
  const atrasados = todos.filter(estaAtrasado);
  const banner = document.getElementById('atraso-banner');
  if (atrasados.length) {
    banner.classList.add('show');
    document.getElementById('atraso-list').innerHTML = atrasados.map(c=>{
      const n = etapaEsperada(c)-c.etapa;
      return `<div class="atraso-item"><i class="ti ti-clock-exclamation"></i>
        <strong>${c.nome}</strong> — etapa ${c.etapa}, deveria estar na ${etapaEsperada(c)} (${n} ciclo${n>1?'s':''} em atraso)
      </div>`;
    }).join('');
  } else banner.classList.remove('show');

  const lista = document.getElementById('lista');
  if (!filtrados.length) {
    lista.innerHTML=`<div class="empty"><i class="ti ti-mood-empty"></i><p>Nenhum cliente encontrado.</p></div>`;
    return;
  }

  lista.innerHTML = filtrados.map(c => {
    const et = ETAPAS[c.etapa]||ETAPAS[1];
    const sigla = c.nome.split(' ').slice(0,2).map(p=>p[0]||'').join('').toUpperCase();
    const total = et.itens.length;
    const feitos = Object.values(c.checks).filter(Boolean).length;
    const pct = total>0?Math.round(feitos/total*100):0;
    const isOpen = abertos[c.id];
    const atrasado = estaAtrasado(c);
    const noHoje   = estaNoHoje(c);
    const dataIni  = c.dataInicio ? new Date(c.dataInicio+'T12:00:00').toLocaleDateString('pt-BR') : '—';

    let cardClass = `cliente-card ${atrasado?'atrasado':EP_CARD(c.etapa)}${c.concluida?' concluido':''}`;
    const statusBadge = atrasado
      ? `<span class="badge-atr">Em atraso</span>`
      : noHoje ? `<span class="badge-hoje">Ciclo hoje</span>` : '';
    const nokBadge = c.nok.length&&!c.concluida ? `<span class="badge-nok">⚠ Pendência</span>` : '';
    const okBadge  = c.concluida ? `<span class="badge-ok">✓ Concluído</span>` : '';

    return `
    <div class="${cardClass}" id="card-${c.id}">
      <div class="card-header" onclick="toggleCard(${c.id})">
        <div class="avatar ${AV_COR(c.etapa)}">${sigla}</div>
        <div class="card-info">
          <div class="card-nome">${c.nome}</div>
          <div class="card-meta">
            <span>${calcDias(c.dataInicio)} dias</span>
            <span class="meta-sep">·</span>
            <span>${feitos}/${total} itens (${pct}%)</span>
            <span class="meta-sep">·</span>
            <span>${c.consultora.charAt(0).toUpperCase()+c.consultora.slice(1)}</span>
            ${statusBadge||nokBadge||okBadge ? '<span class="meta-sep">·</span>' : ''}
            ${statusBadge}${nokBadge}${okBadge}
          </div>
        </div>
        <div class="card-right">
          <span class="etapa-pill ${EP_PILL(c.etapa)}">${c.etapa} · ${et.nome}</span>
          <i class="ti ti-chevron-down chevron ${isOpen?'open':''}"></i>
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="card-body ${isOpen?'open':''}">
        <div class="cl-section">
          <div class="cl-section-title"><i class="ti ti-checklist"></i> Checklist · ${et.nome} · ciclo de ${et.ciclo} dias</div>
          ${et.itens.map((item,i)=>`
          <div class="cl-item">
            <div class="cl-checkbox ${c.checks[i]?'checked':''}" onclick="toggleCheck(${c.id},${i})"></div>
            <span class="cl-label ${c.checks[i]?'done':''}" onclick="toggleCheck(${c.id},${i})">${item}</span>
          </div>`).join('')}
          ${c.nok.length?`
          <div class="nok-historico">
            <div class="nok-historico-title"><i class="ti ti-alert-circle"></i> Pendências registradas</div>
            ${c.nok.map(n=>`<div class="nok-entry"><strong>${n.data}</strong> — ${n.motivo}</div>`).join('')}
          </div>`:''}
        </div>
        <div class="card-footer">
          <span class="footer-info">Ciclo de ${et.ciclo} dias · Início: ${dataIni}${c.gnp?' · GNP '+c.gnp:''}</span>
          <button class="btn btn-crm" onclick="abrirCrm(${c.id})"><i class="ti ti-external-link"></i> GNP</button>
          <button class="btn btn-nok" onclick="abrirModalNok(${c.id})"><i class="ti ti-x"></i> Não concluído</button>
          <button class="btn btn-ok"  onclick="concluirEtapa(${c.id})"><i class="ti ti-check"></i> Concluir etapa</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── AÇÕES ────────────────────────────────────────────────────────────────────
function toggleCard(id) { abertos[id]=!abertos[id]; renderLista(); }

function toggleCheck(clienteId,idx) {
  const c=CLIENTES.find(x=>x.id===clienteId);
  c.checks[idx]=!c.checks[idx];
  salvarLocal();
  logAction(c,'CHECK',`Item ${idx+1}: ${ETAPAS[c.etapa].itens[idx]}`);
  renderLista();
}

function abrirCrm(id) {
  const c=CLIENTES.find(x=>x.id===id);
  alert(`Abrir GNP para: ${c.nome}\nCódigo: ${c.gnp||'—'}`);
}

function concluirEtapa(id) {
const c = CLIENTES.find(x => x.id === id);
const et = ETAPAS[c.etapa];
const total = et.itens.length;
const feitos = Object.values(c.checks).filter(Boolean).length;
if (feitos < total && !confirm(`Ainda há ${total-feitos} item(ns) não marcados. Deseja concluir mesmo assim?`)) return;
const etapaCorreta = etapaEsperada(c);
// Se estiver na etapa 5, mantém na 5 até faltar 120 dias para vencer
let novaEtapa = etapaCorreta;
// Se estiver na renovação, avança normalmente
if (c.etapa >= 6 && c.etapa < 9) {
novaEtapa = c.etapa + 1;
}
logAction(c, 'CONCLUIU', `Etapa ${c.etapa}: ${et.nome}`, novaEtapa);
c.etapa = novaEtapa;
c.checks = {};
abertos[id] = false;
salvarLocal();
renderLista();
}

function abrirModalNok(id) {
  const c=CLIENTES.find(x=>x.id===id);
  modalClienteId=id;
  document.getElementById('modal-nok-sub').textContent=`${c.nome} · Etapa ${c.etapa}: ${ETAPAS[c.etapa].nome}`;
  document.getElementById('modal-nok-texto').value='';
  document.getElementById('modal-nok').classList.add('show');
}
function fecharModal() { document.getElementById('modal-nok').classList.remove('show'); modalClienteId=null; }
function salvarNok() {
  const texto=document.getElementById('modal-nok-texto').value.trim();
  if (!texto) { alert('Por favor, descreva o motivo.'); return; }
  const c=CLIENTES.find(x=>x.id===modalClienteId);
  c.nok.push({data:hoje.toLocaleDateString('pt-BR'),motivo:texto});
  logAction(c,'NAO_CONCLUIU',texto);
  salvarLocal(); fecharModal(); renderLista();
}
document.getElementById('modal-nok').addEventListener('click',function(e){if(e.target===this)fecharModal();});

async function logAction(c, acao, detalhe, novaEtapa) {
  if (!API_URL) return;
  try {
    await fetch(API_URL, {
      method:'POST',
      body: JSON.stringify({
        clienteId:   c.id,
        rowIndex:    c.rowIndex,
        clienteNome: c.nome,
        consultora:  c.consultora,
        etapa:       c.etapa,
        novaEtapa:   novaEtapa || null,
        acao, detalhe
      })
    });
  } catch(e) { /* silencioso */ }
}

// ─── DEMO ─────────────────────────────────────────────────────────────────────

  function diasAtras(n){const d=new Date(hoje);d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}
  return [
    {id:1,rowIndex:2,gnp:'001',nome:'Prefeitura de Maringá',consultora:'taina',dataInicio:diasAtras(15),checks:{},nok:[],concluida:false,etapa:1},
    {id:2,rowIndex:3,gnp:'002',nome:'Câmara Municipal Londrina',consultora:'taina',dataInicio:diasAtras(45),checks:{},nok:[],concluida:false,etapa:2},
    {id:3,rowIndex:4,gnp:'003',nome:'SAAE Apucarana',consultora:'karina',dataInicio:diasAtras(75),checks:{},nok:[],concluida:false,etapa:3},
    {id:4,rowIndex:5,gnp:'004',nome:'Fórum Regional Norte',consultora:'kaueryn',dataInicio:diasAtras(10),checks:{},nok:[],concluida:false,etapa:1},
    {id:5,rowIndex:6,gnp:'005',nome:'IPPUL Londrina',consultora:'taina',dataInicio:diasAtras(160),checks:{},nok:[],concluida:false,etapa:6},
  ];

carregarClientes();
</script>
