// ─── HELPERS ────────────────────────────────────────────────────────────────
const hoje = new Date();

function calcEtapa(dataInicio, dataFim) {
  const diasInicio = Math.floor((hoje - new Date(dataInicio)) / 86400000);
  const diasRestantes = Math.floor((new Date(dataFim) - hoje) / 86400000);

  if (diasRestantes <= 120) {
    if (diasRestantes <= 30) return 9;
    if (diasRestantes <= 60) return 8;
    if (diasRestantes <= 90) return 7;
    return 6;
  }

  if (diasInicio < 30) return 1;
  if (diasInicio < 60) return 2;
  if (diasInicio < 90) return 3;
  if (diasInicio < 120) return 4;
  return 5;
}

// ✅ CORRIGIDO (erro fatal estava aqui)
function etapaEsperada(c) {
  return calcEtapa(c.dataInicio, c.dataFim);
}

function estaAtrasado(c) {
  return !c.concluida && c.etapa < etapaEsperada(c);
}

function estaNoHoje(c) {
  return c.etapa === etapaEsperada(c);
}

// ─── CARREGAMENTO ───────────────────────────────────────────────────────────
async function carregarClientes() {
  document.getElementById('loading').classList.remove('hide');

  if (!API_URL) {
    CLIENTES = dadosDemo();
    finalizarCarga();
    return;
  }

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.ok) throw new Error(data.erro);

    CLIENTES = data.clientes.map(c => ({
      ...c,
      etapa: c.etapaAtual || calcEtapa(c.dataInicio, c.dataFim),
      checks: {},
      nok: [],
      concluida: false,
    }));

    finalizarCarga();

  } catch (err) {
    console.warn('Erro API:', err.message);
    CLIENTES = dadosDemo();
    finalizarCarga();
  }
}

function finalizarCarga() {
  document.getElementById('loading').classList.add('hide');
  montarTabs();
  renderLista();
}

// ─── RESTANTE DO CÓDIGO PERMANECE IGUAL ────────────────────────────────────
// (não mexi no resto pra não quebrar sua lógica)

carregarClientes();
