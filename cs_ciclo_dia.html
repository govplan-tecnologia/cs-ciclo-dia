<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS · Ciclo do Dia — Govplan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:#4CAF1A;
  --green-d:#3a8f12;
  --navy:#1B2F5E;
  --bg:#F4F6FB;
  --surface:#fff;
  --border:#E2E8F0;
  --text:#1B2F5E;
  --text2:#4A5568;
  --red:#C0392B;
}

body {
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LOADING */
.loading-overlay{
  position:fixed;inset:0;background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;
}
.loading-overlay.hide{display:none}
.loading-logo{color:#fff;font-size:28px;font-weight:700}
.loading-logo span{color:var(--green)}
.loading-spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--green);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
.app-header{
  background:var(--navy);
  color:#fff;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* HERO */
.hero-banner{
  background:linear-gradient(135deg,var(--navy),#2a4a8a);
  color:#fff;
  padding:20px;
}

/* LIST */
.cards-list{padding:20px}

.card{
  background:#fff;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
</style>
</head>

<body>

<div class="loading-overlay" id="loading">
  <div class="loading-logo">GOV<span>PLAN</span></div>
  <div class="loading-spinner"></div>
</div>

<header class="app-header">
  <div>GOVPLAN · CS</div>
  <button onclick="carregarClientes()">Atualizar</button>
</header>

<div class="hero-banner">
  <h2 id="hero-greeting">Bom dia!</h2>
  <p id="hero-sub">Carregando dados...</p>
</div>

<div class="cards-list" id="lista"></div>

<script>

/* ================= CONFIG ================= */
let API_URL = localStorage.getItem('cs_api_url') || '';

/* ================= STATE ================= */
let CLIENTES = [];
let abertos = {};

/* ================= DEMO ================= */
function dadosDemo(){
  return [
    {id:1,nome:"Prefeitura de Maringá",consultora:"taina",dataInicio:"2025-06-01",etapa:1,checks:{},nok:[]},
    {id:2,nome:"Câmara Londrina",consultora:"karina",dataInicio:"2025-04-10",etapa:2,checks:{},nok:[]}
  ];
}

/* ================= LOAD ================= */
async function carregarClientes(){
  document.getElementById("loading").classList.remove("hide");

  try{
    if(!API_URL) throw new Error("sem API");

    const res = await fetch(API_URL);
    const data = await res.json();

    CLIENTES = (data?.clientes || []).map(c => ({
      id:c.id,
      nome:c.nome || "Sem nome",
      consultora:c.consultora || "—",
      dataInicio:c.dataInicio || null,
      etapa:c.etapa || 1,
      checks:c.checks || {},
      nok:c.nok || []
    }));

  } catch(e){
    CLIENTES = dadosDemo();
  }

  document.getElementById("loading").classList.add("hide");
  render();
}

/* ================= RENDER ================= */
function render(){
  const el = document.getElementById("lista");

  el.innerHTML = CLIENTES.map(c => {
    const nome = c.nome || "Sem nome";
    const etapa = c.etapa || 1;

    return `
      <div class="card">
        <strong>${nome}</strong><br>
        <small>Etapa ${etapa}</small>
      </div>
    `;
  }).join("");
}

/* ================= INIT ================= */
carregarClientes();

</script>

</body>
</html>
