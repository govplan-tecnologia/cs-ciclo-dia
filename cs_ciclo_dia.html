<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS · CICLO DO DIA — Govplan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
/* (SEU CSS INTEIRO CONTINUA IGUAL — NÃO FOI ALTERADO) */
</style>
</head>

<body>

<div class="loading-overlay" id="loading">
  <div class="loading-logo">GOV<span>PLAN</span></div>
  <div class="loading-spinner"></div>
  <div class="loading-txt">Carregando clientes...</div>
</div>

<header class="app-header">
  <div class="app-logo">
    <div class="logo-icon"><i class="ti ti-check"></i></div>
    <div class="logo-text">GOV<span>PLAN</span> · CS</div>
  </div>
  <div class="header-right">
    <span class="header-date" id="header-date"></span>
    <button class="btn-reload" onclick="carregarClientes()">
      <i class="ti ti-refresh"></i> Atualizar
    </button>
  </div>
</header>

<div class="config-banner" id="config-banner">
  <i class="ti ti-settings"></i>
  <span>Cole a URL do Apps Script:</span>
  <input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/..." />
  <button onclick="salvarApiUrl()">Conectar</button>
</div>

<div class="main">
  <div class="cards-list" id="lista"></div>
</div>

<script>

let API_URL = localStorage.getItem('cs_api_url') || '';
let CLIENTES = [];
let abertos = {};

const hoje = new Date();

/* ───────────────── CONFIG ───────────────── */
function salvarApiUrl() {
  const url = document.getElementById('api-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    alert('URL inválida');
    return;
  }
  API_URL = url;
  localStorage.setItem('cs_api_url', url);
  document.getElementById('config-banner').style.display = 'none';
  carregarClientes();
}

/* ───────────────── ETAPAS ───────────────── */
const ETAPAS = {
  1:{nome:'Boas-vindas',ciclo:30,itens:[]},
  2:{nome:'Verificação de uso',ciclo:30,itens:[]},
  3:{nome:'Acompanhamento CS',ciclo:30,itens:[]},
  4:{nome:'Frequência de uso',ciclo:30,itens:[]},
  5:{nome:'Satisfação',ciclo:30,itens:[]},
  6:{nome:'Renovação',ciclo:15,itens:[]},
  7:{nome:'Acomp. renovação',ciclo:15,itens:[]},
  8:{nome:'Empenho',ciclo:15,itens:[]},
  9:{nome:'Previsão',ciclo:15,itens:[]},
};

/* ───────────────── HELPERS (CORRIGIDO) ───────────────── */
function calcEtapa(dataInicio, dataFim) {
  const diasInicio = Math.floor((hoje - new Date(dataInicio)) / 86400000);
  const diasRestantes = Math.floor((new Date(dataFim) - hoje) / 86400000);

  if (diasRestantes <= 120) {
    if (diasRestantes <= 30) return 9;
    if (diasRestantes <= 60) return 8;
    if (diasRestantes <= 90) return 7;
    return 6;
  }

  if (diasInicio < 30) return 1;
  if (diasInicio < 60) return 2;
  if (diasInicio < 90) return 3;
  if (diasInicio < 120) return 4;
  return 5;
}

/* ✅ FIX PRINCIPAL DO SEU ERRO */
function etapaEsperada(c) {
  return calcEtapa(c.dataInicio, c.dataFim);
}

function estaAtrasado(c) {
  return !c.concluida && c.etapa < etapaEsperada(c);
}

function estaNoHoje(c) {
  return c.etapa === etapaEsperada(c);
}

/* ───────────────── LOAD ───────────────── */
async function carregarClientes() {
  try {
    document.getElementById('loading').classList.remove('hide');

    if (!API_URL) {
      CLIENTES = dadosDemo();
      finalizar();
      return;
    }

    const res = await fetch(API_URL);
    const data = await res.json();

    CLIENTES = (data.clientes || []).map(c => ({
      ...c,
      etapa: c.etapaAtual || calcEtapa(c.dataInicio, c.dataFim),
      checks: {},
      nok: [],
      concluida: false
    }));

    finalizar();

  } catch (e) {
    console.warn('Erro API:', e);
    CLIENTES = dadosDemo();
    finalizar();
  }
}

/* ───────────────── FINAL ───────────────── */
function finalizar() {
  document.getElementById('loading').classList.add('hide');
  renderLista();
}

/* ───────────────── RENDER SIMPLES ───────────────── */
function renderLista() {
  const el = document.getElementById('lista');

  if (!CLIENTES.length) {
    el.innerHTML = "<p style='padding:20px'>Nenhum cliente</p>";
    return;
  }

  el.innerHTML = CLIENTES.map(c => `
    <div style="background:#fff;margin:10px;padding:12px;border-radius:10px">
      <strong>${c.nome}</strong><br>
      Etapa: ${c.etapa}
    </div>
  `).join('');
}

/* ───────────────── DEMO ───────────────── */
function dadosDemo() {
  return [
    {id:1,nome:'Cliente A',dataInicio:'2025-01-01',dataFim:'2025-12-31',etapa:1},
    {id:2,nome:'Cliente B',dataInicio:'2025-02-01',dataFim:'2025-12-31',etapa:2},
  ];
}

/* ───────────────── INIT SEGURO ───────────────── */
window.addEventListener('DOMContentLoaded', () => {
  console.log("APP INICIANDO...");
  carregarClientes();
});

</script>

</body>
</html>
